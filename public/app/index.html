<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Вызов мастеров и курьеров, поиск запчастей по всему Казахстану.">
  <meta name="theme-color" content="#16306b">

  <!-- iOS: установка на экран «Домой» -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jondey">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Jondey — мастера и запчасти</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #jondey-loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0d2c5c; color: #fff;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #jondey-loading .sp {
      width: 46px; height: 46px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,.22); border-top-color: #fff;
      animation: jd-spin 1s linear infinite;
    }
    @keyframes jd-spin { to { transform: rotate(360deg); } }
    #jondey-loading .nm { margin-top: 20px; font-size: 28px; font-weight: 800; letter-spacing: .5px; }
    #jondey-loading .sub { margin-top: 6px; font-size: 13px; opacity: .7; }
  </style>
</head>
<body>
  <!-- Брендовый экран загрузки (Flutter убирает его после первого кадра). -->
  <div id="jondey-loading">
    <div class="sp"></div>
    <div class="nm">Jondey</div>
    <div class="sub">Загрузка…</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('jondey-loading');
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
